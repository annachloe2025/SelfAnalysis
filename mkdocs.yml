# ======================================================================
# MkDocs 設定ファイル — SelfAnalysis（私という人間の自己分析）
# ----------------------------------------------------------------------
# ローカル確認 : python -m mkdocs serve     → http://127.0.0.1:8000
# 本番ビルド   : python -m mkdocs build     → site/ フォルダに成果物
# GitHub公開   : python -m mkdocs gh-deploy → GitHub Pages に直接公開
# ======================================================================

site_name: 私という人間
site_description: 47歳で自分を理解した人間の自己分析・履歴・思考体系（Self Analysis）
site_author: hoehoe
site_url: https://annachloe2025.github.io/SelfAnalysis/

repo_url: https://github.com/annachloe2025/SelfAnalysis
repo_name: annachloe2025/SelfAnalysis
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

# 移行中の旧構造退避先・新アーキテクチャの作業ディレクトリをビルド対象から除外
# （Phase 0: 2026-05-08 追加）
exclude_docs: |
  _legacy/

theme:
  name: material
  custom_dir: overrides
  language: ja
  favicon: assets/favicon.ico
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: ダークモードに切り替え
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: ライトモードに切り替え
  font:
    text: Noto Sans JP
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang:
        - ja
        - en
  - tags:
      tags_file: tags.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

hooks:
  - hooks/generate_archive.py

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/annachloe2025/SelfAnalysis

copyright: "&copy; 2026 hoehoe"

strict: false
use_directory_urls: true

nav:
  - はじめに:
      - index.md
  - ビュー層（多面的な見え方）:
      - views/index.md
      - 主題別:
          - views/主題別/index.md
          - メイレズビアンレンズ: views/主題別/メイレズビアンレンズ.md
          - HSPレンズ: views/主題別/HSPレンズ.md
          - 承認欲求レンズ: views/主題別/承認欲求レンズ.md
          - 合理性駆動レンズ: views/主題別/合理性駆動レンズ.md
          - ヒューマニズムレンズ: views/主題別/ヒューマニズムレンズ.md
          - 創作・物語レンズ: views/主題別/創作・物語レンズ.md
          - 社会観レンズ: views/主題別/社会観レンズ.md
      - 時系列:
          - views/時系列/index.md
          - 9年×2サイクル伝記: views/時系列/9年×2サイクル伝記.md
          - ライフフェーズ別伝記: views/時系列/ライフフェーズ別伝記.md
          - 簡易年表: views/時系列/簡易年表.md
      - 抽象度別:
          - views/抽象度別/index.md
          - 全エピソード索引: views/抽象度別/全エピソード索引.md
          - 全主張カタログ: views/抽象度別/全主張カタログ.md
          - 全仮説マップ: views/抽象度別/全仮説マップ.md
          - 用語集: views/抽象度別/用語集.md
          - 価値観体系: views/抽象度別/価値観体系.md
      - 関係別:
          - views/関係別/index.md
          - 私と社会: views/関係別/私と社会.md
          - 私と他者: views/関係別/私と他者.md
          - 私と身体: views/関係別/私と身体.md
          - 私と AI: views/関係別/私とAI.md
          - 私と母: views/関係別/私と母.md
      - 用途別:
          - views/用途別/index.md
          - 履歴書ビュー: views/用途別/履歴書ビュー.md
          - AI引き継ぎビュー: views/用途別/AI引き継ぎビュー.md
      - 信頼度別:
          - views/信頼度別/index.md
          - 確信していること: views/信頼度別/確信していること.md
          - 仮説の段階: views/信頼度別/仮説の段階.md
          - まだわからないこと: views/信頼度別/まだわからないこと.md
      - 入口別:
          - views/入口別/index.md
          - 性同一性から入る: views/入口別/性同一性から入る.md
          - 思想から入る: views/入口別/思想から入る.md
          - AI活用から入る: views/入口別/AI活用から入る.md
  - データ層:
      - エピソード（EP）: data/episodes/index.md
      - 主張（CL）: data/claims/index.md
      - 仮説（HY）: data/hypotheses/index.md
      - 概念（CO）: data/concepts/index.md
      - 価値観（VL）: data/values/index.md
      - 事実（FA）: data/facts/index.md
      - 人物（PP）: data/people/index.md
      - 時期（TP）: data/periods/index.md
      - 理論（TH）: data/theories/index.md
      - 影響源（IN）: data/influences/index.md
      - 反応（RP）: data/reactions/index.md
      - 行動（BP）: data/behaviors/index.md
  - タグ一覧: tags.md
